<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Tabellone Pallanuoto</title>

<style>

:root{
--dark-bg:#0d1117;
--light-bg:#e9eef5;
--led:#ff3b3b;
}

body{
margin:0;
font-family:Segoe UI,Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
transition:0.3s;
}

body.dark{
background:var(--dark-bg);
color:white;
}

body.light{
background:var(--light-bg);
color:#111;
}

h1{
margin:10px;
letter-spacing:3px;
}

.scoreboard{
display:grid;
grid-template-columns:1fr 1fr;
gap:120px;
margin-top:20px;
}

.team{
font-size:28px;
text-align:center;
}

.score{
font-size:150px;
text-align:center;
}

.timer{
font-size:120px;
margin:20px;
font-weight:600;
}

.shotclock{
font-size:130px;
color:var(--led);
font-weight:bold;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
margin:4px;
}

.controls{
text-align:center;
}

.signature{
position:fixed;
bottom:8px;
right:10px;
font-size:11px;
opacity:0.4;
}

.theme{
position:fixed;
top:10px;
right:10px;
}

</style>
</head>

<body class="dark">

<button class="theme" onclick="toggleTheme()">🌙 / ☀️</button>

<h1>TABELLONE PALLANUOTO</h1>

<div class="scoreboard">

<div>
<div class="team">Squadra A</div>
<div id="scoreA" class="score">0</div>
<div class="controls">
<button onclick="goal('A')">GOAL</button>
</div>
</div>

<div>
<div class="team">Squadra B</div>
<div id="scoreB" class="score">0</div>
<div class="controls">
<button onclick="goal('B')">GOAL</button>
</div>
</div>

</div>

<div class="timer" id="gameTimer">08:00</div>

<div class="controls">

<button onclick="startGame()">START</button>
<button onclick="stopGame()">STOP</button>
<button onclick="nextPeriod()">PROSSIMO TEMPO</button>

</div>

<div>
Tempo: <span id="period">1</span>
</div>

<br>

<h2>Shot Clock</h2>

<div id="shotClock" class="shotclock">28</div>

<div class="controls">
<button onclick="resetShot()">RESET 28</button>
</div>

<br>

<h2>Espulsione</h2>

<div id="exclusion" class="shotclock">18</div>

<div class="controls">
<button onclick="startExclusion()">ESPULSIONE</button>
</div>

<div class="signature">
Realizzato da Alessandro Longoni
</div>

<script>

let scoreA=0
let scoreB=0

function goal(team){

if(team==="A"){
scoreA++
document.getElementById("scoreA").innerText=scoreA
}

if(team==="B"){
scoreB++
document.getElementById("scoreB").innerText=scoreB
}

resetShot()

}

let minutes=8
let seconds=0
let gameInterval

let shot=28
let shotInterval

function updateGame(){

let m = minutes.toString().padStart(2,'0')
let s = seconds.toString().padStart(2,'0')

document.getElementById("gameTimer").innerText = m+":"+s

}

function updateShot(){

document.getElementById("shotClock").innerText=shot

}

function startGame(){

clearInterval(gameInterval)
clearInterval(shotInterval)

gameInterval=setInterval(()=>{

if(seconds===0){

if(minutes===0){

clearInterval(gameInterval)
clearInterval(shotInterval)

beep()

return

}

minutes--
seconds=59

}else{

seconds--

}

updateGame()

},1000)

shotInterval=setInterval(()=>{

if(shot>0){

shot--

updateShot()

}else{

clearInterval(shotInterval)

beep()

}

},1000)

}

function stopGame(){

clearInterval(gameInterval)
clearInterval(shotInterval)

}

function resetShot(){

shot=28
updateShot()

}

let period=1

function nextPeriod(){

if(period<4){

period++

minutes=8
seconds=0
shot=28

updateGame()
updateShot()

document.getElementById("period").innerText=period

}

}

function startExclusion(){

let ex=18

document.getElementById("exclusion").innerText=ex

let exInterval=setInterval(()=>{

if(ex>0){

ex--

document.getElementById("exclusion").innerText=ex

}else{

clearInterval(exInterval)

}

},1000)

}

function beep(){

let ctx=new (window.AudioContext||window.webkitAudioContext)()

let osc=ctx.createOscillator()

osc.connect(ctx.destination)

osc.start()

osc.stop(ctx.currentTime+0.4)

}

function toggleTheme(){

document.body.classList.toggle("dark")
document.body.classList.toggle("light")

}

updateGame()
updateShot()

</script>

</body>
</html>
